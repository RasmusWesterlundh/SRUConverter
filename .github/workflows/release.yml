name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - runtime: win-x64
            artifact: SruConverter-win-x64.exe
          - runtime: linux-x64
            artifact: SruConverter-linux-x64
          - runtime: osx-x64
            artifact: SruConverter-osx-x64
          - runtime: osx-arm64
            artifact: SruConverter-osx-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      run: |
        dotnet publish SruConverter.csproj \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -o ./publish

    - name: Rename artifact
      run: |
        src=./publish/SruConverter
        [ -f "./publish/SruConverter.exe" ] && src=./publish/SruConverter.exe
        mv "$src" ./publish/${{ matrix.artifact }}
        chmod +x ./publish/${{ matrix.artifact }} 2>/dev/null || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ./publish/${{ matrix.artifact }}

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
      with:
        files: ./publish/${{ matrix.artifact }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to latest pre-release (manual run)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
      with:
        tag_name: latest
        name: Latest build (main)
        prerelease: true
        files: ./publish/${{ matrix.artifact }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
